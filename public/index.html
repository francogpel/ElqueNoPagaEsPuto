<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dividir gastos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0E0E10;color:#F2F0EB;min-height:100vh;display:flex;justify-content:center}
#app{width:100%;max-width:390px;padding:0 24px 80px;display:flex;flex-direction:column}
input,button{font-family:inherit}
input{background:#1F1F23;border:1.5px solid #2A2A2E;border-radius:10px;color:#F2F0EB;font-size:14px;padding:10px 12px;outline:none;width:100%;transition:border-color .2s}
input:focus{border-color:#F0A843}
input::placeholder{color:#48484D}
.label{color:#76767A;font-size:12px;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:8px}
.card{background:#1F1F23;border-radius:14px;border:1px solid #2A2A2E;padding:14px 16px}
.row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;transition:background .4s,box-shadow .4s}
.dot.paid{background:#6ECB3C;box-shadow:0 0 8px #6ECB3C}
.dot.unpaid{background:#E85D5D}
.badge{font-size:11px;padding:2px 8px;border-radius:20px}
.badge.paid{color:#6ECB3C;background:#1E3D10}
.badge.me{color:#F0A843;background:#3A2E10}
.badge.open{color:#F0A843;background:rgba(240,168,67,.15)}
.badge.closed{color:#6ECB3C;background:#1E3D10}
.btn-primary{background:#F0A843;color:#000;border:none;border-radius:14px;padding:15px;font-weight:700;font-size:14px;cursor:pointer;width:100%;transition:opacity .2s}
.btn-primary:disabled{opacity:.35;cursor:default}
.btn-ghost{background:#18181B;border:1px solid #2A2A2E;border-radius:14px;padding:14px;color:#76767A;font-size:14px;cursor:pointer;width:100%;transition:border-color .2s}
.btn-ghost:hover{border-color:#F0A843}
.btn-google{background:#fff;color:#111;border:none;border-radius:14px;padding:14px;font-weight:600;font-size:14px;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:10px}
.btn-mp{background:#009EE3;color:#fff;border:none;border-radius:14px;padding:14px 18px;font-weight:700;font-size:14px;cursor:pointer;width:100%;display:flex;align-items:center;gap:12px;transition:opacity .2s}
.btn-mp:disabled{opacity:.5;cursor:default}
.btn-small{font-size:11px;padding:5px 10px;border-radius:8px;border:1px solid #2A2A2E;background:none;color:#76767A;cursor:pointer}
.btn-back{background:none;border:1px solid #2A2A2E;border-radius:8px;color:#76767A;font-size:12px;padding:6px 12px;cursor:pointer}
.add-btn{background:#F0A843;color:#000;border:none;border-radius:10px;padding:0 18px;font-weight:800;font-size:20px;cursor:pointer;flex-shrink:0}
.add-btn:disabled{background:#1F1F23;color:#48484D;cursor:default}
.dashed{border:1px dashed #2A2A2E;border-radius:12px;padding:22px;text-align:center}
.muted{color:#48484D;font-size:12px}
.sub{color:#76767A;font-size:13px}
.accent{color:#F0A843}
.green{color:#6ECB3C}
.mp-color{color:#009EE3}
.gap8{display:flex;flex-direction:column;gap:8px}
.gap10{display:flex;flex-direction:column;gap:10px}
.gap18{display:flex;flex-direction:column;gap:18px}
.gap22{display:flex;flex-direction:column;gap:22px}
.mp-connected{background:#0A1E2E;border:1px solid rgba(0,158,227,.3);border-radius:14px;padding:14px 16px}
.mp-idle{background:#0A1E2E;border:1px solid #2A2A2E;border-radius:14px;padding:14px 16px;text-align:center}
.pay-box{background:#0A1E2E;border-radius:16px;padding:16px;border:1px solid rgba(0,158,227,.25)}
.paid-box{background:#1E3D10;border-radius:16px;padding:14px 16px;border:1px solid rgba(110,203,60,.3);display:flex;align-items:center;gap:12px}
.all-paid{background:#1E3D10;border-radius:14px;padding:14px;text-align:center;border:1px solid rgba(110,203,60,.3)}
.summary{background:#18181B;border-radius:14px;padding:14px 16px;border:1px solid #2A2A2E;display:flex;justify-content:space-between}
.link-box{background:#18181B;border-radius:8px;padding:10px 12px;border:1px solid #2A2A2E;overflow:hidden;flex:1}
.link-text{color:#48484D;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.copy-btn{background:#3A2E10;color:#F0A843;border:none;border-radius:7px;padding:8px 12px;font-size:11px;font-weight:600;cursor:pointer;flex-shrink:0}
.copy-btn.done{background:#1E3D10;color:#6ECB3C}
.divider{display:flex;align-items:center;gap:12px}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:#2A2A2E}
.divider span{color:#48484D;font-size:12px}
.err{color:#E85D5D;font-size:13px;text-align:center;min-height:18px}
.join-btn{background:#1F1F23;border:1px solid #2A2A2E;border-radius:14px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;width:100%;transition:border-color .15s}
.join-btn:hover{border-color:#F0A843}
.room-card{background:#1F1F23;border:1px solid #2A2A2E;border-radius:16px;padding:16px;width:100%;text-align:left;cursor:pointer;transition:background .15s,border-color .15s}
.room-card:hover{background:#252529;border-color:#F0A843}
.progress-bar{height:4px;background:#2A2A2E;border-radius:2px;overflow:hidden;margin:10px 0}
.progress-fill{height:100%;border-radius:2px;transition:width .4s ease}
#modal{position:fixed;inset:0;background:rgba(0,0,0,.82);display:none;align-items:center;justify-content:center;z-index:200;padding:24px}
#modal.show{display:flex}
.modal-box{background:#1F1F23;border-radius:20px;padding:28px 24px;width:100%;max-width:320px;border:1px solid #2A2A2E;text-align:center}
.user-pill{display:flex;align-items:center;gap:8px;background:#1F1F23;border:1px solid #2A2A2E;border-radius:10px;padding:7px 12px;margin-top:16px;margin-bottom:16px}
.user-pill img{width:26px;height:26px;border-radius:50%;object-fit:cover}
.user-pill .av{width:26px;height:26px;border-radius:50%;background:#3A2E10;display:flex;align-items:center;justify-content:center;font-size:10px;color:#F0A843;font-weight:700;flex-shrink:0}
svg{overflow:visible}
</style>
</head>
<body>

<!-- Modal de confirmación de pago en efectivo -->
<div id="modal">
  <div class="modal-box">
    <div style="font-size:32px;margin-bottom:12px">💵</div>
    <h3 style="font-size:18px;font-weight:700;margin-bottom:8px;color:#F2F0EB">Pago en efectivo</h3>
    <p style="color:#76767A;font-size:14px;line-height:1.5;margin-bottom:24px">
      ¿Confirmás que <strong style="color:#F2F0EB" id="modal-name"></strong> pagó su parte en efectivo?
    </p>
    <div style="display:flex;gap:10px">
      <button onclick="closeModal()" class="btn-ghost" style="flex:1;padding:14px">No</button>
      <button onclick="confirmMarkPaid()" class="btn-primary" style="flex:1;padding:14px">Sí, confirmar</button>
    </div>
  </div>
</div>

<div id="app">
  <div style="display:flex;justify-content:center;align-items:center;height:100vh">
    <p style="color:#48484D">Cargando…</p>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
// ════════════════════════════════════════════════════════════════════════════
// ESTADO GLOBAL DE LA APP
// ════════════════════════════════════════════════════════════════════════════
const S = {
  screen:   "loading",  // loading|login|setup|mis-salas|created|join|adminRoom|room
  user:     null,       // usuario de Firebase
  rooms:    [],         // salas del admin (historial)
  room:     null,       // sala activa
  myId:     null,       // ID del participante en la sala actual
  shareUrl: "",
  loadingId: null,
  animTotal: 0,
  polling:   null,
  pendingMarkId: null,
  mpStatus: null,       // { connected, nickname }
};

// Detectar parámetros de URL
const urlParams   = new URLSearchParams(location.search);
const roomParam   = urlParams.get("room");
const mpConnected = urlParams.get("mp_connected");
const mpError     = urlParams.get("mp_error");

// ════════════════════════════════════════════════════════════════════════════
// FIREBASE — INICIALIZACIÓN
// Los valores vienen del servidor (GET /api/config) que los lee del .env
// ════════════════════════════════════════════════════════════════════════════
async function initFirebase() {
  try {
    const cfg = await fetch("/api/config").then(r => r.json());
    if (!cfg.apiKey) {
      // Sin Firebase configurado: modo desarrollo sin auth
      S.authReady = true;
      startApp();
      return;
    }
    firebase.initializeApp(cfg);
    firebase.auth().onAuthStateChanged(user => {
      S.user = user;
      if (!S.authReady) { S.authReady = true; startApp(); }
      else render();
    });
  } catch {
    S.authReady = true;
    startApp();
  }
}

function startApp() {
  if (roomParam) {
    S.screen = "join";
  } else if (!S.user && firebase.apps?.length) {
    S.screen = "login";
  } else {
    // Si MP acaba de conectarse, volver al setup con mensaje
    if (mpConnected) {
      history.replaceState({}, "", "/");
    }
    S.screen = "setup";
    if (S.user) loadAdminData();
  }
  render();
}

// ── Helpers de autenticación ──────────────────────────────────────────────────
async function getToken() {
  if (!S.user) return "";
  return S.user.getIdToken();
}
async function authFetch(url, opts = {}) {
  const token = await getToken();
  return fetch(url, {
    ...opts,
    headers: {
      "Content-Type": "application/json",
      ...(token ? { Authorization: `Bearer ${token}` } : {}),
      ...opts.headers,
    },
  });
}

async function signInGoogle() {
  setAuthErr("");
  try {
    await firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider());
    await loadAdminData();
    S.screen = "setup"; render();
  } catch(e) { setAuthErr(authErrMsg(e.code)); }
}
async function signInEmail(isSignup) {
  setAuthErr("");
  const email = document.getElementById("inp-email")?.value.trim();
  const pass  = document.getElementById("inp-pass")?.value;
  if (!email || !pass) return setAuthErr("Completá email y contraseña");
  try {
    if (isSignup) await firebase.auth().createUserWithEmailAndPassword(email, pass);
    else          await firebase.auth().signInWithEmailAndPassword(email, pass);
    await loadAdminData();
    S.screen = "setup"; render();
  } catch(e) { setAuthErr(authErrMsg(e.code)); }
}
function signOut() {
  firebase.auth().signOut();
  S.user = null; S.room = null; S.myId = null;
  S.rooms = []; S.mpStatus = null;
  S.screen = "login"; stopPolling(); render();
}
function authErrMsg(code) {
  const m = {
    "auth/user-not-found":"No existe una cuenta con ese email",
    "auth/wrong-password":"Contraseña incorrecta",
    "auth/email-already-in-use":"Ya existe una cuenta con ese email",
    "auth/weak-password":"La contraseña debe tener al menos 6 caracteres",
    "auth/invalid-email":"Email inválido",
    "auth/popup-closed-by-user":"",
  };
  return m[code] || "Ocurrió un error. Intentá de nuevo.";
}
function setAuthErr(msg) { const el = document.getElementById("auth-err"); if(el) el.textContent = msg; }

// Carga el historial de salas y el estado MP del admin
async function loadAdminData() {
  try {
    const [roomsRes, mpRes] = await Promise.all([
      authFetch("/api/rooms"),
      authFetch("/api/mp-oauth/status"),
    ]);
    if (roomsRes.ok) S.rooms = await roomsRes.json();
    if (mpRes.ok)   S.mpStatus = await mpRes.json();
  } catch {}
}

// ════════════════════════════════════════════════════════════════════════════
// MERCADO PAGO OAUTH
// ════════════════════════════════════════════════════════════════════════════
async function connectMercadoPago() {
  try {
    const res  = await authFetch("/api/mp-oauth/url");
    const data = await res.json();
    if (data.url) {
      // Redirigimos al admin a Mercado Pago para que autorice la app
      window.location.href = data.url;
    } else {
      alert(data.error || "No se pudo obtener el link de autorización de Mercado Pago");
    }
  } catch {
    alert("Error al conectar con Mercado Pago. Revisá la consola.");
  }
}

// ════════════════════════════════════════════════════════════════════════════
// SVG RUEDA
// ════════════════════════════════════════════════════════════════════════════
function polar(cx,cy,r,deg){const a=(deg-90)*Math.PI/180;return[cx+r*Math.cos(a),cy+r*Math.sin(a)];}
function slicePath(cx,cy,r,ri,s,e){
  const g=1.5;s+=g;e-=g;
  const[x1,y1]=polar(cx,cy,r,s),[x2,y2]=polar(cx,cy,r,e);
  const[ix1,iy1]=polar(cx,cy,ri,s),[ix2,iy2]=polar(cx,cy,ri,e);
  const la=e-s>180?1:0;
  return`M${ix1} ${iy1}L${x1} ${y1}A${r} ${r} 0 ${la} 1 ${x2} ${y2}L${ix2} ${iy2}A${ri} ${ri} 0 ${la} 0 ${ix1} ${iy1}Z`;
}
function buildWheel(participants, myId, isAdmin) {
  const cx=155,cy=155,r=132,ri=52,n=participants.length,step=360/n;
  let svg=`<svg width="310" height="310" viewBox="0 0 310 310">
    <defs><filter id="gp"><feGaussianBlur stdDeviation="4" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>`;
  participants.forEach((p,i)=>{
    const sa=i*step,ea=sa+step,ma=sa+step/2;
    const[lx,ly]=polar(cx,cy,(r+ri)/2,ma);
    const isMe=p.id===myId,busy=S.loadingId===p.id;
    const fill=p.paid?"#6ECB3C":busy?"#888":"#E85D5D";
    const canTap=(isMe||isAdmin)&&!p.paid&&!S.loadingId;
    const short=p.name.length>7?p.name.slice(0,6)+"…":p.name;
    const onclick=canTap?`doPay('${p.id}','${isAdmin}')`:null;
    svg+=`<g ${onclick?`onclick="${onclick}"`:""}  style="cursor:${canTap?"pointer":"default"}">`;
    if(isMe&&!p.paid)svg+=`<path d="${slicePath(cx,cy,r+7,ri-5,sa,ea)}" fill="#F0A843" opacity="0.2"/>`;
    svg+=`<path d="${slicePath(cx,cy,r,ri,sa,ea)}" fill="${fill}" ${p.paid?'filter="url(#gp)"':""} opacity="${p.paid?1:.84}" style="transition:fill .5s"/>`;
    if(step>28)svg+=`<text x="${lx}" y="${ly-(step>50?7:0)}" text-anchor="middle" dominant-baseline="central" fill="#fff" font-size="${step>60?12:step>40?11:9}" font-weight="600" style="pointer-events:none">${short}</text>`;
    if(step>50)svg+=`<text x="${lx}" y="${ly+8}" text-anchor="middle" dominant-baseline="central" fill="rgba(255,255,255,.6)" font-size="9" style="pointer-events:none">${p.paid?"✓":busy?"…":isMe?"tocame":"—"}</text>`;
    svg+=`</g>`;
  });
  svg+=`<circle cx="${cx}" cy="${cy}" r="${ri-1}" fill="#18181B"/>
        <circle cx="${cx}" cy="${cy}" r="${ri-1}" fill="none" stroke="#2A2A2E" stroke-width="1"/>
  </svg>`;
  return svg;
}

// ════════════════════════════════════════════════════════════════════════════
// RENDER PRINCIPAL
// ════════════════════════════════════════════════════════════════════════════
function render() {
  const app = document.getElementById("app");
  if (S.screen === "login")     return renderLogin(app);
  if (S.screen === "setup")     return renderSetup(app);
  if (S.screen === "mis-salas") return renderMisSalas(app);
  if (S.screen === "created")   return renderCreated(app);
  if (S.screen === "join")      return renderJoin(app);
  if (S.screen === "adminRoom") return renderRoom(app, true);
  if (S.screen === "room")      return renderRoom(app, false);
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function renderLogin(app) {
  app.innerHTML = `
    <div style="padding-top:72px;text-align:center;margin-bottom:40px">
      <div style="font-size:48px;margin-bottom:14px">🍕</div>
      <h1 style="font-size:26px;font-weight:700;margin-bottom:6px">Dividir gastos</h1>
      <p class="sub">Administrá tus salas de gastos compartidos</p>
    </div>
    <div class="gap10">
      <button class="btn-google" onclick="signInGoogle()">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Continuar con Google
      </button>
      <div class="divider"><span>o ingresá con email</span></div>
      <input id="inp-email" type="email" placeholder="Email" autocomplete="email"/>
      <input id="inp-pass" type="password" placeholder="Contraseña" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')signInEmail(false)"/>
      <p class="err" id="auth-err"></p>
      <button class="btn-primary" onclick="signInEmail(false)">Ingresar</button>
      <button class="btn-ghost" onclick="signInEmail(true)">Crear cuenta nueva</button>
    </div>`;
}

// ── USER PILL ─────────────────────────────────────────────────────────────────
function userPillHTML() {
  if (!S.user) return "";
  const name = S.user.displayName || S.user.email || "Admin";
  const photo = S.user.photoURL;
  const ini = name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
  return `<div class="user-pill">
    ${photo?`<img src="${photo}" alt=""/>`:`<div class="av">${ini}</div>`}
    <span class="sub" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${name}</span>
    <button onclick="signOut()" style="background:none;border:none;color:#48484D;font-size:12px;cursor:pointer">Salir</button>
  </div>`;
}

// ── SETUP ─────────────────────────────────────────────────────────────────────
function renderSetup(app) {
  const connected = S.mpStatus?.connected;
  const nickname  = S.mpStatus?.nickname || "";
  const openCount   = S.rooms.filter(r=>r.participants.some(p=>!p.paid)).length;
  const closedCount = S.rooms.filter(r=>r.participants.every(p=>p.paid)).length;

  app.innerHTML = `
    ${userPillHTML()}
    ${S.rooms.length > 0 ? `
    <button onclick="goMisSalas()" class="room-card" style="margin-bottom:16px;display:flex;align-items:center;gap:12px">
      <div style="width:36px;height:36px;border-radius:10px;background:#252529;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">📋</div>
      <div style="flex:1;text-align:left">
        <p style="font-size:14px;font-weight:600;margin:0 0 2px;color:#F2F0EB">Mis salas</p>
        <p class="sub" style="font-size:12px;margin:0">
          ${openCount>0?`<span class="accent">${openCount} abierta${openCount!==1?"s":""}</span>`:""}
          ${openCount>0&&closedCount>0?`<span style="color:#48484D"> · </span>`:""}
          ${closedCount>0?`<span class="green">${closedCount} cerrada${closedCount!==1?"s":""}</span>`:""}
        </p>
      </div>
      <span style="color:#48484D;font-size:18px">→</span>
    </button>` : ""}

    <div style="margin-bottom:20px">
      <p class="label">Nuevo gasto compartido</p>
      <h1 style="font-size:24px;font-weight:700">Configurá la sala</h1>
    </div>

    <div class="gap18">
      <!-- CONECTAR MERCADO PAGO -->
      <div>
        <span class="label">Tu cuenta de Mercado Pago</span>
        ${connected ? `
        <div class="mp-connected">
          <div class="row">
            <div style="display:flex;align-items:center;gap:10px">
              <svg width="22" height="22" viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="16" fill="#009EE3"/><path d="M6 16.5c0-5.52 4.48-10 10-10s10 4.48 10 10" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/><circle cx="11" cy="19" r="2.5" fill="#fff"/><circle cx="21" cy="19" r="2.5" fill="#fff"/><circle cx="16" cy="21" r="2.5" fill="#fff"/></svg>
              <div>
                <p class="mp-color" style="font-size:12px;font-weight:700;margin:0 0 2px;text-transform:uppercase;letter-spacing:.5px">Mercado Pago conectado</p>
                <p class="sub" style="font-size:13px;margin:0">${nickname}</p>
              </div>
            </div>
            <button onclick="disconnectMP()" class="btn-small">Desconectar</button>
          </div>
          <p style="color:rgba(0,158,227,.7);font-size:11px;margin-top:10px">✓ Los pagos se acreditarán directamente en tu cuenta</p>
        </div>` : `
        <button class="btn-mp" onclick="connectMercadoPago()" id="btn-connect-mp">

          </div>
          <span style="color:rgba(255,255,255,.7);font-size:18px">→</span>
        </button>
        <p class="muted" style="margin-top:8px;text-align:center">Necesitás conectar tu cuenta para recibir los pagos</p>`}
      </div>

      <div style="height:1px;background:#2A2A2E"></div>

      <div>
        <span class="label">¿Qué están dividiendo?</span>
        <input id="inp-title" placeholder="La cena, El asado, El viaje…" oninput="updateSetupBtn()"/>
      </div>

        <span class="label">Total a dividir ($)</span>
        <input id="inp-total" type="number" placeholder="60000" oninput="updateSetupBtn()"/>
        <p id="amount-hint" class="muted" style="margin-top:6px"></p>
      </div>
      <div>
        <span class="label">Participantes</span>
        <div class="row" style="gap:8px;margin-bottom:10px">
          <input id="inp-name" placeholder="Nombre del participante" style="flex:1"
            oninput="updateAddBtn()" onkeydown="if(event.key==='Enter')addName()"/>
          <button class="add-btn" onclick="addName()" id="btn-add" disabled>+</button>
        </div>
        <div id="names-list" class="dashed"><p class="muted">Agregá al menos 2 participantes</p></div>
      </div>
      <button class="btn-primary" onclick="createRoom()" id="btn-create" disabled>Completá todos los campos</button>
    </div>`;
  renderNamesList();
}

let namesList = [];
function updateAddBtn(){
  const v=document.getElementById("inp-name")?.value.trim();
  const b=document.getElementById("btn-add");
  if(b){b.disabled=!v;b.style.background=v?"#F0A843":"#1F1F23";b.style.color=v?"#000":"#48484D";}
}
function updateSetupBtn(){
  const t=document.getElementById("inp-title")?.value.trim();
  const tot=parseInt(document.getElementById("inp-total")?.value||"0",10);
  const n=namesList.length;
  const mp=S.mpStatus?.connected;
  const ok=!!t&&tot>0&&n>=2&&mp;
  const b=document.getElementById("btn-create");
  if(b){
    b.disabled=!ok;
    b.textContent=!mp?"Conectá tu Mercado Pago primero":
      !t||!tot?"Completá todos los campos":
      n<2?"Agregá al menos 2 participantes":
      `Crear sala con ${n} persona${n!==1?"s":""} →`;
  }
  const hint=document.getElementById("amount-hint");
  if(hint)hint.textContent=n>=2&&tot>0?`$${Math.round(tot/n).toLocaleString("es-AR")} por persona`:"";
}
function addName(){
  const inp=document.getElementById("inp-name");
  const n=inp.value.trim();
  if(!n||namesList.includes(n))return;
  namesList.push(n);inp.value="";inp.focus();
  updateAddBtn();renderNamesList();updateSetupBtn();
}
function removeName(name){
  namesList=namesList.filter(x=>x!==name);renderNamesList();updateSetupBtn();
}
function renderNamesList(){
  const el=document.getElementById("names-list");
  if(!el)return;
  if(!namesList.length){el.innerHTML=`<p class="muted">Agregá al menos 2 participantes</p>`;el.className="dashed";return;}
  el.className="gap8";
  el.innerHTML=namesList.map((n,i)=>`
    <div class="card row">
      <div class="row" style="gap:10px"><span class="muted">${i+1}</span><span>${n}</span></div>
      <button onclick="removeName('${n}')" style="background:none;border:none;color:#48484D;cursor:pointer;font-size:18px;padding:0 4px">×</button>
    </div>`).join("");
}
async function disconnectMP(){
  S.mpStatus={connected:false};render();
}
async function createRoom(){
  const title=document.getElementById("inp-title")?.value.trim();
  const total=parseInt(document.getElementById("inp-total")?.value,10);
  if(!title||!total||namesList.length<2)return;
  const b=document.getElementById("btn-create");
  b.disabled=true;b.textContent="Creando sala…";
  try{
    const res=await authFetch("/api/rooms",{method:"POST",body:JSON.stringify({title,total,participants:namesList})});
    if(res.status===401){alert("Sesión expirada. Volvé a ingresar.");S.screen="login";render();return;}
    const data=await res.json();
    S.room=data;S.shareUrl=data.shareUrl||`${location.origin}/?room=${data.id}`;
    S.rooms=[data,...S.rooms];
    namesList=[];
    S.screen="created";render();
  }catch{alert("Error al crear la sala.");b.disabled=false;updateSetupBtn();}
}
function goMisSalas(){S.screen="mis-salas";render();}

      </div>
    </div>
    ${!S.rooms.length?`
    <div class="dashed" style="padding:40px 24px">
      <div style="font-size:36px;margin-bottom:12px">📋</div>
      <p style="color:#76767A;font-size:15px;font-weight:500;margin:0 0 6px">Todavía no creaste ninguna sala</p>
      <p class="muted" style="margin:0">Volvé al inicio para crear tu primera sala</p>
    </div>`:``}
    ${openRooms.length?`
    <div class="row" style="margin-bottom:12px">
      <div style="width:8px;height:8px;border-radius:50%;background:#F0A843;flex-shrink:0"></div>
      <p class="label" style="margin:0">Salas abiertas (${openRooms.length})</p>

    <div class="row" style="margin-bottom:12px">
      <div style="width:8px;height:8px;border-radius:50%;background:#6ECB3C;flex-shrink:0"></div>
      <p class="label" style="margin:0">Salas cerradas (${closedRooms.length})</p>
    </div>
    <div class="gap8">${closedRooms.map(roomCard).join("")}</div>`:``}`;
}
function openRoom(id){

  if(r){S.room=r;S.shareUrl=`${location.origin}/?room=${r.id}`;S.screen="adminRoom";startPolling();render();}

function goBack(){
  stopPolling();S.myId=null;S.loadingId=null;S.animTotal=0;
  if(roomParam)S.screen="join";
  else if(S.rooms.length>1)S.screen="mis-salas";
  else S.screen="created";
  render();
}
function toggleAliasEdit(){
  const ed=document.getElementById("alias-edit");
  if(ed)ed.style.display=ed.style.display==="none"?"block":"none";
}
async function saveAlias(){
  const val=document.getElementById("inp-alias")?.value.trim()||"";
  try{
    const res=await authFetch(`/api/rooms/${S.room.id}/alias`,{method:"PATCH",body:JSON.stringify({alias:val})});
    if(res.ok){
      S.room=await res.json();
      S.rooms=S.rooms.map(r=>r.id===S.room.id?S.room:r);
      render();
    }
  }catch{alert("No se pudo guardar el alias.");}
}

// ── MODAL EFECTIVO ────────────────────────────────────────────────────────────
function askMarkPaid(id,name){
  S.pendingMarkId=id;
  document.getElementById("modal-name").textContent=name;
  document.getElementById("modal").classList.add("show");
}
function closeModal(){document.getElementById("modal").classList.remove("show");S.pendingMarkId=null;}
async function confirmMarkPaid(){
  const id=S.pendingMarkId;closeModal();
  if(!id)return;
  S.loadingId=id;render();
  try{
    const res=await authFetch(`/api/rooms/${S.room.id}/mark-paid/${id}`,{method:"POST"});
    if(res.ok){S.room=await res.json();S.rooms=S.rooms.map(r=>r.id===S.room.id?S.room:r);}
  }catch{alert("Error al marcar como pagado.");}
  S.loadingId=null;render();
}

// ── PAGOS Y POLLING ───────────────────────────────────────────────────────────
async function doPay(participantId,isAdminStr){
  if(S.loadingId)return;
  if(isAdminStr==="true"){
    const p=S.room.participants.find(x=>x.id===participantId);
    askMarkPaid(participantId,p?.name||"");return;
  }
  S.loadingId=participantId;render();
  try{
    const res=await fetch(`/api/rooms/${S.room.id}/pay/${participantId}`,{method:"POST",headers:{"Content-Type":"application/json"}});
    const data=await res.json();
    if(data.init_point)window.open(data.init_point,"_blank");
    else alert(data.error||"No se pudo generar el link de pago.");
  }catch{alert("Error al generar el link de pago.");}
  S.loadingId=null;render();
}
function startPolling(){
  stopPolling();
  S.polling=setInterval(async()=>{
    if(!S.room)return;
    try{
      const res=await fetch(`/api/rooms/${S.room.id}`);
      if(!res.ok)return;
      const updated=await res.json();
      const prev=JSON.stringify(S.room.participants.map(p=>p.paid));
      const next=JSON.stringify(updated.participants.map(p=>p.paid));
      if(prev!==next){
        S.room=updated;
        S.rooms=S.rooms.map(r=>r.id===updated.id?updated:r);
        render();
      }
    }catch{}
  },3000);
}
function stopPolling(){if(S.polling){clearInterval(S.polling);S.polling=null;}}

let animFrame;
function animateTotal(from,to){
  if(animFrame)cancelAnimationFrame(animFrame);
  if(from===to){S.animTotal=to;return;}
  const t0=performance.now(),dur=600;
  function tick(now){
    const p=Math.min((now-t0)/dur,1),e=1-Math.pow(1-p,3);
    S.animTotal=Math.round(from+(to-from)*e);
    const el=document.getElementById("anim-total");
    if(el)el.textContent="$"+S.animTotal.toLocaleString("es-AR");
    if(p<1)animFrame=requestAnimationFrame(tick);
    else S.animTotal=to;
  }
  animFrame=requestAnimationFrame(tick);
}

document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal();});
document.getElementById("modal").addEventListener("click",e=>{if(e.target===e.currentTarget)closeModal();});

initFirebase();
</script>
